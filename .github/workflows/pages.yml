# SPDX-License-Identifier: Apache-2.0
#
# Build the WASM demo and deploy to GitHub Pages.

name: Pages

on:
  push:
    branches: [main, master, dev/jfi]
    paths:
      - '.github/workflows/pages.yml'
      - 'demo/**'
      - 'src/access-point/**'
      - 'src/sss/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build WASM with Emscripten
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            emscripten/emsdk:latest \
            make -C demo clean all

      - name: Prepare Pages artifact
        run: |
          mkdir -p pages/scripts
          cp src/access-point/assets/index.html   pages/
          cp src/access-point/assets/split.html   pages/
          cp src/access-point/assets/unsplit.html pages/
          cp src/access-point/assets/style.css    pages/
          cp demo/scripts/sss.js                  pages/scripts/
          cp demo/scripts/sss.wasm                pages/scripts/
          cp src/access-point/assets/scripts/split.js   pages/scripts/
          cp src/access-point/assets/scripts/unsplit.js pages/scripts/
          ls -la pages/ pages/scripts/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
